name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install Flet CLI
        run: pip install "flet==0.24.1"

      - name: Build APK
        run: flet build apk --no-rich-output --verbose
        env:
          FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Routine-Alarm-APK
          path: |
            build/apk/*.apk
            build/**/*.apk
          retention-days: 7
