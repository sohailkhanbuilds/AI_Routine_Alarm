name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # manual trigger button on GitHub

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Install Flet CLI
        run: pip install flet

      - name: Build APK
        run: flet build apk --no-rich-output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Routine-Alarm-APK
          path: build/apk/app-release.apk
          retention-days: 7
